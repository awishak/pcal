<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e293b" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>PCAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Anton: heavy condensed block, used only for jersey numbers. -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f8fafc; }
      * { -webkit-tap-highlight-color: transparent; }

      /* Made-basket celebration on a player row. Tailwind is loaded from the
         CDN build, which has no custom keyframes, so these live here. */
      @keyframes pcal-shine {
        from { transform: translateX(-130%) skewX(-18deg); }
        to   { transform: translateX(240%)  skewX(-18deg); }
      }
      @keyframes pcal-pop {
        0%   { transform: scale(.4) translateY(6px);   opacity: 0; }
        12%  { transform: scale(1.22) translateY(-3px); opacity: 1; }
        22%  { transform: scale(1) translateY(-3px);    opacity: 1; }
        82%  { transform: scale(1) translateY(-4px);    opacity: 1; }
        100% { transform: scale(.95) translateY(-16px); opacity: 0; }
      }
      .pcal-shine { position: absolute; inset: 0; overflow: hidden; pointer-events: none; border-radius: inherit; }
      .pcal-shine::after {
        content: ""; position: absolute; top: -20%; bottom: -20%; width: 58%;
        background: linear-gradient(100deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,.45) 22%,
          rgba(253,224,71,.55) 40%,
          rgba(255,255,255,1) 50%,
          rgba(253,224,71,.55) 60%,
          rgba(255,255,255,.45) 78%,
          rgba(255,255,255,0) 100%);
        filter: blur(.4px);
        animation: pcal-shine 1.15s cubic-bezier(.25,.8,.35,1) forwards;
      }
      .pcal-pop { animation: pcal-pop 2.9s cubic-bezier(.2,1.4,.4,1) forwards; }
      @keyframes pcal-ripple {
        from { transform: scale(.15); opacity: .6; }
        to   { transform: scale(11);  opacity: 0; }
      }
      .pcal-ripple { position: absolute; inset: 0; overflow: hidden; pointer-events: none; border-radius: inherit; }
      .pcal-ripple::after,
      .pcal-ripple::before {
        content: ""; position: absolute; left: 50%; top: 50%;
        width: 34px; height: 34px; margin: -17px 0 0 -17px; border-radius: 9999px;
        border: 3px solid var(--pcal-ripple, #111827);
        animation: pcal-ripple 1.25s cubic-bezier(.2,.7,.3,1) forwards;
      }
      .pcal-ripple::before { animation-delay: .22s; opacity: 0; }
      @media (prefers-reduced-motion: reduce) {
        .pcal-shine::after { animation: none; opacity: 0; }
        .pcal-pop { animation: none; }
        .pcal-ripple::after, .pcal-ripple::before { animation: none; opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
